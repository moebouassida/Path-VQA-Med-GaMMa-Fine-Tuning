pretrained_model: "google/medgemma-4b-it"
dataset_name: "moebouassida/path-vqa-enhanced"
use_enhanced_answer: true

per_device_train_batch_size: 8       # SigLIP attention is O(batch * patches^2); higher values OOM on H100
gradient_accumulation_steps: 4       # effective batch = 32
num_train_epochs: 3
learning_rate: 2e-4
warmup_ratio: 0.05
max_grad_norm: 1.0
logging_steps: 10
save_strategy: "steps"
save_steps: 100
save_total_limit: 3
optim: "adamw_torch_fused"
weight_decay: 0.01
lr_scheduler_type: "cosine"
max_seq_length: 2048
seed: 3407
dataloader_num_workers: 2

# Flash Attention 2 gives ~2x training speedup but requires a prebuilt wheel.
# Disabled by default — no wheel exists for cu130+torch2.12 and the CUDA driver
# mismatch on RunPod pods prevents compiling from source.
# pip install flash-attn --no-build-isolation
use_flash_attention: false
attn_implementation: "sdpa"   # sdpa = PyTorch fused attention, no install needed

lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
use_dora: true
use_rslora: true               # requires peft >= 0.13.0

# 4-bit NF4 disabled by default — bitsandbytes doesn't support CUDA 13.0 yet.
# Enable on older GPUs with limited VRAM (e.g. RTX 3090 24 GB).
load_in_4bit: false
bnb_4bit_use_double_quant: true
bnb_4bit_quant_type: "nf4"
bnb_4bit_compute_dtype: "bfloat16"

output_dir: "outputs"
resize: 512

gate_exact_match: 0.55
gate_bleu: 0.20

hub_model_id: "moebouassida/medgemma-4b-path-vqa"   # set to null to skip HF Hub push
wandb_project: "path-vqa-medgemma"
wandb_entity: null
mlflow_experiment: "path-vqa-medgemma"
mlflow_tracking_uri: ""   # blank = local mlruns/
