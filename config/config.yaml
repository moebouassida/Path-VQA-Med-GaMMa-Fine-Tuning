# =========================
# Model & Dataset
# =========================
pretrained_model: "unsloth/medgemma-4b-it-unsloth-bnb-4bit"
dataset_name: "moebouassida/path-vqa-enhanced"
use_enhanced_answer: true        # use enhanced_answer column (richer explanations)

# =========================
# Training
# =========================
per_device_train_batch_size: 2
gradient_accumulation_steps: 2
num_train_epochs: 3
learning_rate: 2e-4
warmup_steps: 10
max_grad_norm: 0.3
logging_steps: 10
save_strategy: "steps"
save_steps: 100
optim: "adamw_torch_fused"
weight_decay: 0.01
lr_scheduler_type: "cosine"
max_seq_length: 2048

# =========================
# LoRA
# =========================
lora_r: 16
lora_alpha: 16
lora_dropout: 0

# =========================
# General
# =========================
output_dir: "outputs"
resize: 512
seed: 3407

# =========================
# Quality Gates
# =========================
gate_exact_match: 0.55       # yes/no questions exact match
gate_bleu: 0.20              # open-ended BLEU score

# =========================
# Tracking
# =========================
wandb_project: "path-vqa-medgemma"
wandb_entity: null           # set to your W&B username
mlflow_experiment: "path-vqa-medgemma"
mlflow_tracking_uri: ""      # blank = local mlruns/