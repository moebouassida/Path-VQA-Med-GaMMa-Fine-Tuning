# =========================
# Model & Dataset
# =========================
pretrained_model: "google/medgemma-4b-it"
dataset_name: "moebouassida/path-vqa-enhanced"
use_enhanced_answer: true            # use enhanced_answer column (richer explanations)

# =========================
# Training  (RTX 5090 / 32 GB VRAM optimized)
# =========================
per_device_train_batch_size: 16       # stable with DoRA on 32 GB; raise to 8 if VRAM allows
gradient_accumulation_steps: 2       # effective batch size = 32
num_train_epochs: 3
learning_rate: 2e-4
warmup_ratio: 0.05                   # 5% of total steps for LR warm-up (converted to warmup_steps in code)
max_grad_norm: 1.0
logging_steps: 10
save_strategy: "steps"
save_steps: 100
save_total_limit: 3
optim: "adamw_torch_fused"           # fastest AdamW on CUDA
weight_decay: 0.01
lr_scheduler_type: "cosine"
max_seq_length: 2048
seed: 3407
dataloader_num_workers: 2

# =========================
# Flash Attention 2
# Requires: pip install flash-attn --no-build-isolation
# Gives ~2x training speedup on Blackwell GPUs (RTX 5090).
# Disabled by default: CUDA 13.0 (RunPod PyTorch 2.12) has a compile mismatch.
# Enable if your CUDA version supports it.
# =========================
use_flash_attention: false

# =========================
# LoRA / DoRA / RSLoRA
# DoRA  = Weight-Decomposed LoRA — better parameter efficiency than standard LoRA
# RSLoRA = Rank-Stabilized LoRA  — stabilises gradient flow for higher ranks
# Requires: peft >= 0.13.0
# =========================
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
use_dora: true
use_rslora: true

# =========================
# 4-bit NF4 Quantization  (QLoRA)
# Disabled by default: bitsandbytes is incompatible with CUDA 13.0 (RTX 5090 / Blackwell).
# The RTX 5090 has 32 GB VRAM so QLoRA is unnecessary regardless.
# Enable only on older GPUs with limited VRAM (e.g. RTX 3090 24 GB).
# =========================
load_in_4bit: false
bnb_4bit_use_double_quant: true
bnb_4bit_quant_type: "nf4"
bnb_4bit_compute_dtype: "bfloat16"   # RTX 5090 supports bf16 natively (requires torch>=2.8)

# =========================
# Output
# =========================
output_dir: "outputs"
resize: 512

# =========================
# Quality Gates
# =========================
gate_exact_match: 0.55               # yes/no accuracy threshold
gate_bleu: 0.20                      # open-ended BLEU threshold

# =========================
# Tracking
# =========================
hub_model_id: "moebouassida/medgemma-4b-path-vqa"   # set to null to disable HF Hub push
wandb_project: "path-vqa-medgemma"
wandb_entity: null                   # set to your W&B username/org
mlflow_experiment: "path-vqa-medgemma"
mlflow_tracking_uri: ""              # blank = local mlruns/
