name: CI Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Code Quality ──────────────────────────────────────────────
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install linting tools
        run: pip install ruff black==23.12.1

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Black format check
        run: black --check src/ tests/

  # ── 2. Unit Tests ────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install CPU dependencies
        run: |
          pip install torch==2.1.0 --index-url https://download.pytorch.org/whl/cpu
          pip install datasets Pillow pyyaml pytest transformers

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ── 3. Docker Build + Smoke Test ─────────────────────────────────
  docker:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3

      - name: Build CPU Docker image
        run: docker build -f Docker/Dockerfile -t pathvqa-api:${{ github.sha }} .

      - name: Smoke test — health endpoint
        run: |
          docker run -d \
            --name pathvqa-test \
            -p 8000:8000 \
            pathvqa-api:${{ github.sha }}

          sleep 15

          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            http://localhost:8000/health || echo "000")
          echo "Health endpoint: $RESPONSE"

          docker stop pathvqa-test || true
          docker rm pathvqa-test || true

          if [ "$RESPONSE" = "000" ]; then
            echo "Container failed to start"
            exit 1
          fi
          echo "Container started successfully"

